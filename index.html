<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=https://kofitoto.blog" />
  <title>Redirecting to kofitoto.blog...</title>
  <link rel="canonical" href="https://kofitoto.blog" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      margin: 0 4px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    p {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #888;
    }
    a {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    a:hover { color: #ccc; }
  </style>
</head>
<body>
  <div class="container">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <p>
      Redirecting to
      <a href="https://kofitoto.blog">kofitoto.blog</a>…
    </p>
  </div>
</body>
</html>
